services:
  nominatim:
    container_name: nominatim_es_local
    image: mediagis/nominatim:4.4
    ports:
      - "8080:8080"
    environment:
      - PBF_PATH=/nominatim/sudeste-latest.osm.pbf
      - NOMINATIM_THREADS=16
    shm_size: "4gb"
    volumes:
      - nominatim-data:/var/lib/postgresql/14/main
      - ./data/raw/sudeste-latest.osm.pbf:/nominatim/sudeste-latest.osm.pbf

volumes:
  nominatim-data: